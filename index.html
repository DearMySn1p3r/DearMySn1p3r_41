<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH ROSTER</title>
<link rel="icon" type="image/png" href="「ARCH」 Symbol Logo Black Ver.png">
<link rel="apple-touch-icon" href="「ARCH」 Symbol Logo Black Ver.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --border: rgba(255,255,255,0.08);
  --line-color: rgba(255,255,255,0.55);
  --class-color: #fff;
}

body {
  background: #080c12; color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh; padding: 40px 24px 80px;
}

/* ── Color Controls ───────────────────────────────────── */
.color-controls {
  display: flex; justify-content: center;
  gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: center;
}
.color-ctrl-item {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
}
.color-ctrl-item input[type=color] {
  width: 22px; height: 22px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px; cursor: pointer;
  background: none; padding: 1px;
}
.color-ctrl-group {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
}
.color-ctrl-group .pickers {
  display: flex; align-items: center; gap: 3px;
}
.grad-arrow {
  font-size: 10px; color: rgba(255,255,255,0.3);
  user-select: none;
}
.dir-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.45);
  font-size: 13px; width: 22px; height: 22px;
  border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; padding: 0;
}
.dir-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
.grad-preview-line {
  width: 44px; height: 3px; border-radius: 2px;
  background: #fff; flex-shrink: 0;
}
.grad-preview-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.15em;
  background: linear-gradient(to right, #fff, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  user-select: none; flex-shrink: 0;
}

/* ── Page Header ─────────────────────────────────────── */
.page-header {
  text-align: center;
  margin-bottom: 28px;
}
.page-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 42px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #fff; user-select: none;
}
.page-subtitle {
  font-size: 11px; color: rgba(255,255,255,0.35);
  letter-spacing: 0.1em; margin-top: 4px;
  font-family: 'Noto Sans KR', sans-serif;
}
.title-underline {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin-top: 14px;
}

/* ── Controls ────────────────────────────────────────── */
.controls {
  display: flex; justify-content: center;
  gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.55);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; letter-spacing: 0.1em;
  padding: 8px 20px; cursor: pointer;
  transition: all 0.2s; border-radius: 2px;
}
.btn:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
.btn-save { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); color: #fff; }
.btn-save:hover { background: rgba(255,255,255,0.12); }

/* ── Capture wrapper ─────────────────────────────────── */
#capture-area {
  display: inline-block;
  min-width: 400px;
  max-width: 1000px;
  width: fit-content;
  margin: 0 auto;
  display: flex;
  justify-content: center;
}
.capture-center {
  display: flex;
  justify-content: center;
}

#roster-canvas {
  display: inline-block;
  min-width: 360px;
  max-width: 960px;
  width: fit-content;
  background: var(--bg);
  padding: 32px 36px 36px;
  border-radius: 14px;
}

/* ── Section ─────────────────────────────────────────── */
.section { margin-bottom: 44px; }
.section-header {
  position: relative;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 10px;
  gap: 12px;
}
.section-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right,
    var(--line-color) 0%,
    color-mix(in srgb, var(--line-color) 45%, transparent) 35%,
    color-mix(in srgb, var(--line-color) 11%, transparent) 65%,
    transparent 100%
  );
}

.section-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff; outline: none; min-width: 40px; cursor: text;
}
.section-name:focus { border-bottom: 1px solid rgba(255,255,255,0.25); }
.section-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.section-class {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.2em; color: var(--class-color);
  outline: none; min-width: 20px; cursor: text; text-transform: uppercase;
  background: var(--class-grad, none);
  -webkit-background-clip: var(--class-grad-clip, unset);
  -webkit-text-fill-color: var(--class-text-fill, var(--class-color));
  background-clip: var(--class-grad-clip, unset);
}
.section-class:focus { border-bottom: 1px solid rgba(255,255,255,0.25); }
.section-del {
  color: rgba(255,255,255,0.18); cursor: pointer;
  font-size: 15px; padding: 0 2px; transition: color 0.2s;
  user-select: none; background: none; border: none; line-height: 1;
}
.section-del:hover { color: rgba(255,255,255,0.5); }

/* ── Card grid ───────────────────────────────────────── */
.card-grid { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }

/* ── Card ────────────────────────────────────────────── */
.card { position: relative; width: 128px; flex-shrink: 0; }

.card-img-wrap {
  position: relative; width: 128px; height: 158px;
  border-radius: 7px; overflow: hidden;
  background: #161a22; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.28);
  contain: paint;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.card-img-wrap img {
  position: absolute;
  inset: 0;
  display: block;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  transform-origin: center center;
  user-select: none;
  -webkit-user-drag: none;
}
.card-img-wrap.panning { cursor: grabbing; }
.card-img-wrap.panning img { cursor: grabbing; }

/* gradient overlay */
.card-gradient {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 62%; pointer-events: none; z-index: 1;
}
.grad-sentinel .card-gradient {
  background: linear-gradient(to top, rgba(0,0,0,0.90) 0%, transparent 100%);
}
.grad-guide .card-gradient {
  background: linear-gradient(to top, rgba(255,255,255,0.88) 0%, transparent 100%);
}

/* inner info */
.card-inner-info {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  padding: 0 8px 8px;
  display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
}

/* 이름: sentinel=흰색, guide=검은색 */
.card-name {
  font-size: 12px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: text; outline: none;
  max-width: 112px; text-align: left; width: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
.grad-guide .card-name {
  color: #111 !important;
  text-shadow: none !important;
}
.card-name:focus { background: rgba(128,128,128,0.15); border-radius: 2px; padding: 0 3px; }

/* attr select */
.card-attr-select {
  appearance: none; -webkit-appearance: none;
  border: none; outline: none;
  font-size: 10px;
  padding: 2px 10px 2px;
  border-radius: 20px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  text-align: center; text-align-last: center;
  line-height: 1.4;
}
.card-attr-select option { background: #1a1e2a; color: #fff; }

/* 속성 색상: 얼음/번개/무속성 → 검은 글씨, 나머지 → 흰 글씨 */
.attr-fire      { background: rgba(220,72,40,0.92);   color: #fff; }
.attr-water     { background: rgba(50,140,210,0.92);  color: #fff; }
.attr-grass     { background: rgba(60,160,80,0.92);   color: #fff; }
.attr-lightning { background: rgba(230,185,30,0.95);  color: #1a1000; }
.attr-wind      { background: rgba(100,195,170,0.92); color: #fff; }
.attr-ice       { background: rgba(140,210,235,0.90); color: #0d2530; }
.attr-none      { background: rgba(160,165,180,0.75); color: #111; }

/* remove btn */
.card-remove {
  position: absolute; top: 5px; right: 5px;
  width: 20px; height: 20px;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2px; color: rgba(255,255,255,0.5);
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; z-index: 10;
}
.card:hover .card-remove { opacity: 1; }

/* upload overlay */
.card-upload-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.45); opacity: 0;
  transition: opacity 0.2s;
  cursor: pointer; z-index: 3;
  pointer-events: none;
}
.card-img-wrap:hover .card-upload-overlay { opacity: 1; pointer-events: auto; }
.card-img-wrap:has(.card-inner-info:hover) .card-upload-overlay { opacity: 0 !important; pointer-events: none !important; }
.card-upload-overlay span {
  font-size: 10px; color: rgba(255,255,255,0.85);
  letter-spacing: 0.08em; font-family: 'Rajdhani', sans-serif;
}

/* placeholder */
.card-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
  color: rgba(255,255,255,0.2); font-size: 10px;
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.06em; cursor: pointer;
}

/* type toggle */
.card-type-toggle {
  position: absolute; top: 5px; left: 5px;
  font-size: 8px; font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.06em; padding: 2px 6px;
  border-radius: 2px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.65);
  transition: all 0.2s; z-index: 10; opacity: 0;
}
.card:hover .card-type-toggle { opacity: 1; }

/* add card btn */
.card-add-btn {
  width: 128px; height: 158px;
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 7px; background: transparent;
  color: rgba(255,255,255,0.16); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.card-add-btn:hover { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.4); }

.add-section-row { text-align: center; margin-top: 10px; }
.add-section-btn {
  background: none; border: none; color: rgba(255,255,255,0.18);
  font-family: 'Rajdhani', sans-serif; font-size: 12px;
  letter-spacing: 0.12em; cursor: pointer; padding: 10px 16px;
  transition: color 0.2s;
}
.add-section-btn:hover { color: rgba(255,255,255,0.45); }

#file-input { display: none; }
</style>
</head>
<body>

<div class="controls">
  <button class="btn btn-save" onclick="saveImage()">💾 이미지로 저장</button>
  <button class="btn" onclick="addSection()">+ 섹션 추가</button>
</div>

<div class="color-controls">
  <!-- 선 색 -->
  <div class="color-ctrl-group">
    <span>선 색</span>
    <div class="pickers">
      <input type="color" id="ctrl-line-a" value="#ffffff" oninput="updateLineGrad()">
      <span class="grad-arrow">→</span>
      <input type="color" id="ctrl-line-b" value="#ffffff" oninput="updateLineGrad()">
    </div>
    <button class="dir-btn" id="line-dir-btn" title="방향 전환" onclick="toggleLineDir()">↔</button>
    <div class="grad-preview-line" id="line-preview"></div>
  </div>
  <!-- CLASS 글씨 색 -->
  <div class="color-ctrl-group">
    <span>CLASS 색</span>
    <div class="pickers">
      <input type="color" id="ctrl-class-a" value="#ffffff" oninput="updateClassGrad()">
      <span class="grad-arrow">→</span>
      <input type="color" id="ctrl-class-b" value="#ffffff" oninput="updateClassGrad()">
    </div>
    <button class="dir-btn" id="class-dir-btn" title="방향 전환" onclick="toggleClassDir()">↔</button>
    <div class="grad-preview-text" id="class-preview">CLASS</div>
  </div>
  <!-- 배경 색 -->
  <div class="color-ctrl-group">
    <span>배경 색</span>
    <input type="color" id="ctrl-bg" value="#0d1117" oninput="updateBgColor(this.value)">
  </div>
</div>

<div class="capture-center">
  <div id="capture-area">
    <div id="roster-canvas">
      <div class="page-header">
        <div class="page-title">ARCH ROSTER</div>
        <div class="page-subtitle">공개된 캐릭터 목록</div>
        <div class="title-underline"></div>
      </div>
      <div id="sections-container"></div>
      <div class="add-section-row">
        <button class="add-section-btn" onclick="addSection()">＋ ADD SECTION</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
// ── Font Preload & Cache ────────────────────────────────
let cachedFontCSS = '';
window.addEventListener('load', () => {
  document.fonts.ready.then(() => {
    htmlToImage.getFontEmbedCSS(document.getElementById('capture-area'))
      .then(css => { cachedFontCSS = css; })
      .catch(e => console.error('Font pre-fetch failed:', e));
  });
});

// ── Color Controls ──────────────────────────────────────
let lineDir = 'to right';
let classDir = 'to right';

const LINE_DIRS  = ['to right','to bottom right','to bottom','to bottom left','to left'];
const CLASS_DIRS = ['to right','to bottom right','to bottom','to bottom left','to left'];
const DIR_ICONS  = ['↔','↘','↕','↙','↔'];

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function updateLineGrad() {
  const a = document.getElementById('ctrl-line-a').value;
  const b = document.getElementById('ctrl-line-b').value;
  const isSolid = a === b;

  if (isSolid) {
    const solid = hexToRgba(a, 0.55);
    document.documentElement.style.setProperty('--line-color', solid);
    document.documentElement.style.setProperty('--line-grad-start', solid);
    document.documentElement.style.setProperty('--line-grad-end', solid);
  } else {
    document.documentElement.style.setProperty('--line-grad-start', hexToRgba(a, 0.85));
    document.documentElement.style.setProperty('--line-grad-end', hexToRgba(b, 0.85));
    document.documentElement.style.setProperty('--line-color', hexToRgba(a, 0.55));
  }
  document.documentElement.style.setProperty('--line-grad-dir', lineDir);

  // update section-header::after via dynamic style tag
  applyLineStyle();

  // preview
  const prev = document.getElementById('line-preview');
  prev.style.background = isSolid
    ? a
    : `linear-gradient(${lineDir}, ${a}, ${b})`;
}

function applyLineStyle() {
  const a = document.getElementById('ctrl-line-a').value;
  const b = document.getElementById('ctrl-line-b').value;
  const isSolid = a === b;
  let styleEl = document.getElementById('dynamic-line-style');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'dynamic-line-style';
    document.head.appendChild(styleEl);
  }
  if (isSolid) {
    const c = hexToRgba(a, 0.55);
    styleEl.textContent = `.section-header::after { background: linear-gradient(to right, ${hexToRgba(a,0.85)} 0%, ${hexToRgba(a,0.38)} 35%, ${hexToRgba(a,0.09)} 65%, transparent 100%) !important; }`;
  } else {
    const ca = hexToRgba(a, 0.85);
    const cm = hexToRgba(b, 0.45);
    const ce = `transparent`;
    styleEl.textContent = `.section-header::after { background: linear-gradient(${lineDir}, ${ca} 0%, ${cm} 50%, ${ce} 100%) !important; }`;
  }
}

function toggleLineDir() {
  const dirs = LINE_DIRS;
  const idx = (dirs.indexOf(lineDir) + 1) % dirs.length;
  lineDir = dirs[idx];
  document.getElementById('line-dir-btn').textContent = DIR_ICONS[idx];
  updateLineGrad();
}

function updateClassGrad() {
  const a = document.getElementById('ctrl-class-a').value;
  const b = document.getElementById('ctrl-class-b').value;
  const isSolid = a === b;
  const prev = document.getElementById('class-preview');

  let styleEl = document.getElementById('dynamic-class-style');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'dynamic-class-style';
    document.head.appendChild(styleEl);
  }

  if (isSolid) {
    styleEl.textContent = `.section-class { background: none !important; -webkit-background-clip: unset !important; -webkit-text-fill-color: ${a} !important; background-clip: unset !important; color: ${a} !important; }`;
    prev.style.background = a;
    prev.style.webkitBackgroundClip = 'unset';
    prev.style.webkitTextFillColor = a;
    prev.style.backgroundClip = 'unset';
  } else {
    const grad = `linear-gradient(${classDir}, ${a}, ${b})`;
    styleEl.textContent = `.section-class { background: ${grad} !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; background-clip: text !important; color: transparent !important; }`;
    prev.style.background = grad;
    prev.style.webkitBackgroundClip = 'text';
    prev.style.webkitTextFillColor = 'transparent';
    prev.style.backgroundClip = 'text';
  }
}

function toggleClassDir() {
  const dirs = CLASS_DIRS;
  const idx = (dirs.indexOf(classDir) + 1) % dirs.length;
  classDir = dirs[idx];
  document.getElementById('class-dir-btn').textContent = DIR_ICONS[idx];
  updateClassGrad();
}

function updateBgColor(hex) {
  document.documentElement.style.setProperty('--bg', hex);
  document.getElementById('roster-canvas').style.background = hex;
}

// ── Attr config ──────────────────────────────────────
const ATTRS = [
  { val:'무속성',     cls:'attr-none',      bg:'rgba(160,165,180,0.75)', fg:'#111' },
  { val:'불 속성',    cls:'attr-fire',      bg:'rgba(220,72,40,0.92)',   fg:'#fff' },
  { val:'물 속성',    cls:'attr-water',     bg:'rgba(50,140,210,0.92)',  fg:'#fff' },
  { val:'풀 속성',    cls:'attr-grass',     bg:'rgba(60,160,80,0.92)',   fg:'#fff' },
  { val:'번개 속성',  cls:'attr-lightning', bg:'rgba(230,185,30,0.95)',  fg:'#1a1000' },
  { val:'바람 속성',  cls:'attr-wind',      bg:'rgba(100,195,170,0.92)', fg:'#fff' },
  { val:'얼음 속성',  cls:'attr-ice',       bg:'rgba(140,210,235,0.90)', fg:'#0d2530' },
];
function attrInfo(val) { return ATTRS.find(a=>a.val===val) || ATTRS[0]; }
function attrCls(val)  { return attrInfo(val).cls; }

function normalizeAttr(raw) {
  if (!raw) return '무속성';
  if (ATTRS.find(a=>a.val===raw)) return raw;
  const legacyMap = {
    '없음 속성':'무속성', '없음 (None)':'무속성',
    '불 (Pyre)':'불 속성', '물 (Aqua)':'물 속성',
    '풀 (Verde)':'풀 속성', '번개 (Fulmen)':'번개 속성',
    '바람 (Aero)':'바람 속성', '얼음 (Glacies)':'얼음 속성',
    '어둠 속성':'무속성', '어둠':'무속성', '없음':'무속성',
    '불':'불 속성','물':'물 속성','풀':'풀 속성',
    '번개':'번개 속성','바람':'바람 속성','얼음':'얼음 속성',
  };
  if (legacyMap[raw]) return legacyMap[raw];
  for (const [k,v] of Object.entries(legacyMap)) {
    if (raw.includes(k)) return v;
  }
  return '무속성';
}

// ── State ──────────────────────────────────────────────
let sections = [{
  id:'s1', name:'ARCH', cls:'CLASS',
  cards:[{id:'c1',name:'NAME',attr:'무속성',img:null,type:'sentinel',imgPan:{x:0,y:0,scale:1}}]
}];
let pendingUpload=null, uid=100;
function genId(){ return 'id'+(++uid); }

// ── Render ─────────────────────────────────────────────
function render(){
  const c=document.getElementById('sections-container');
  c.innerHTML='';
  sections.forEach(sec=>c.appendChild(buildSection(sec)));
}

function buildSection(sec){
  const div=document.createElement('div'); div.className='section';
  div.dataset.sectionId=sec.id;
  const hdr=document.createElement('div'); hdr.className='section-header';

  const nameEl=document.createElement('div');
  nameEl.className='section-name'; nameEl.contentEditable='true';
  nameEl.textContent=sec.name; nameEl.spellcheck=false;
  nameEl.addEventListener('blur',e=>{sec.name=e.target.textContent.trim()||'ARCH';});
  nameEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nameEl.blur();}});

  const right=document.createElement('div'); right.className='section-right';
  const clsEl=document.createElement('div');
  clsEl.className='section-class'; clsEl.contentEditable='true';
  clsEl.textContent=sec.cls; clsEl.spellcheck=false;
  clsEl.addEventListener('blur',e=>{sec.cls=e.target.textContent.trim()||'CLASS';});
  clsEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();clsEl.blur();}});

  const delBtn=document.createElement('button'); delBtn.className='section-del';
  delBtn.textContent='×'; delBtn.title='섹션 삭제';
  delBtn.addEventListener('click',()=>{
    sections=sections.filter(s=>s.id!==sec.id);
    div.remove();
  });

  right.appendChild(clsEl); right.appendChild(delBtn);
  hdr.appendChild(nameEl); hdr.appendChild(right);

  const grid=document.createElement('div'); grid.className='card-grid';
  sec.cards.forEach(card=>grid.appendChild(buildCard(sec,card)));

  const addBtn=document.createElement('button'); addBtn.className='card-add-btn';
  addBtn.textContent='+';
  addBtn.addEventListener('click',()=>{
    const newCard={id:genId(),name:'NAME',attr:'무속성',img:null,type:'sentinel',imgPan:{x:0,y:0,scale:1}};
    sec.cards.push(newCard);
    grid.insertBefore(buildCard(sec,newCard),addBtn);
  });
  grid.appendChild(addBtn);

  div.appendChild(hdr); div.appendChild(grid);
  return div;
}

function buildCard(sec,card){
  const type=card.type||'sentinel';
  const wrap=document.createElement('div'); wrap.className='card';
  wrap.dataset.cardId=card.id;

  const imgWrap=document.createElement('div');
  imgWrap.className='card-img-wrap grad-'+type;

  if(card.img){
    const img=document.createElement('img'); img.src=card.img; img.alt='';
    img.crossOrigin='anonymous';
    imgWrap.appendChild(img);
    const ovl=document.createElement('div'); ovl.className='card-upload-overlay';
    ovl.innerHTML='<span>이미지 변경</span>';
    ovl.addEventListener('click',e=>{
      if(imgWrap._isDragMoved && imgWrap._isDragMoved()) return;
      triggerUpload(sec.id,card.id);
    });
    imgWrap.appendChild(ovl);
    requestAnimationFrame(()=>setupImgPanZoom(imgWrap, card, img));
  } else {
    const ph=document.createElement('div'); ph.className='card-placeholder';
    ph.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5"/></svg><span>IMAGE</span>`;
    ph.addEventListener('click',()=>triggerUpload(sec.id,card.id));
    imgWrap.appendChild(ph);
  }

  const grad=document.createElement('div'); grad.className='card-gradient';
  imgWrap.appendChild(grad);

  const info=document.createElement('div'); info.className='card-inner-info';

  const nameEl=document.createElement('div'); nameEl.className='card-name';
  nameEl.contentEditable='true'; nameEl.textContent=card.name; nameEl.spellcheck=false;
  nameEl.addEventListener('blur',e=>{card.name=e.target.textContent.trim()||'NAME';});
  nameEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nameEl.blur();}});
  nameEl.addEventListener('click',e=>e.stopPropagation());

  const normAttr=normalizeAttr(card.attr);
  const sel=document.createElement('select');
  sel.className='card-attr-select '+attrCls(normAttr);
  ATTRS.forEach(a=>{
    const opt=document.createElement('option');
    opt.value=a.val; opt.textContent=a.val;
    if(a.val===normAttr) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change',e=>{
    card.attr=e.target.value;
    sel.className='card-attr-select '+attrCls(e.target.value);
    const ai=attrInfo(e.target.value);
    sel.style.background=ai.bg; sel.style.color=ai.fg;
  });
  sel.addEventListener('click',e=>e.stopPropagation());
  const initAi=attrInfo(normAttr);
  sel.style.background=initAi.bg; sel.style.color=initAi.fg;

  info.appendChild(nameEl); info.appendChild(sel);
  imgWrap.appendChild(info);

  const typeToggle=document.createElement('button'); typeToggle.className='card-type-toggle';
  typeToggle.textContent=type==='sentinel'?'SENTINEL':'GUIDE';
  typeToggle.addEventListener('click',e=>{
    e.stopPropagation();
    card.type=(card.type==='sentinel')?'guide':'sentinel';
    imgWrap.className='card-img-wrap grad-'+card.type;
    typeToggle.textContent=card.type==='sentinel'?'SENTINEL':'GUIDE';
  });
  imgWrap.appendChild(typeToggle);

  const removeBtn=document.createElement('button'); removeBtn.className='card-remove';
  removeBtn.textContent='×';
  removeBtn.addEventListener('click',e=>{
    e.stopPropagation();
    sec.cards=sec.cards.filter(c=>c.id!==card.id);
    wrap.remove();
  });
  imgWrap.appendChild(removeBtn);

  wrap.appendChild(imgWrap);
  return wrap;
}

// ── Image Pan/Zoom ──────────────────────────────────────
function applyImgTransform(img, pan){
  img.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${pan.scale})`;
}

function setupImgPanZoom(imgWrap, card, img){
  if(!img) return;
  if(!card.imgPan) card.imgPan = {x:0, y:0, scale:1};
  applyImgTransform(img, card.imgPan);

  let dragging=false, startX=0, startY=0, startPanX=0, startPanY=0, dragMoved=false;

  imgWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const delta = e.deltaY < 0 ? 0.12 : -0.12;
    card.imgPan.scale = Math.max(0.5, Math.min(4, card.imgPan.scale + delta));
    applyImgTransform(img, card.imgPan);
  }, {passive:false});

  imgWrap.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    if(e.target.closest('.card-inner-info')) return;
    dragging=true; dragMoved=false;
    startX=e.clientX; startY=e.clientY;
    startPanX=card.imgPan.x; startPanY=card.imgPan.y;
    imgWrap.classList.add('panning');
    e.preventDefault();
  });

  let touchStart=null;
  imgWrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      dragging=true; dragMoved=false;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startPanX=card.imgPan.x; startPanY=card.imgPan.y;
      touchStart={x:startX,y:startY};
    }
    if(e.touches.length===2){ touchStart=null; }
  }, {passive:true});

  imgWrap.addEventListener('touchmove', e=>{
    if(e.touches.length===1 && dragging){
      e.preventDefault();
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
      card.imgPan.x=startPanX+dx; card.imgPan.y=startPanY+dy;
      applyImgTransform(img, card.imgPan);
    }
  }, {passive:false});

  imgWrap.addEventListener('touchend', ()=>{
    dragging=false; imgWrap.classList.remove('panning');
  });

  const onMove=e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
    card.imgPan.x=startPanX+dx; card.imgPan.y=startPanY+dy;
    applyImgTransform(img, card.imgPan);
  };
  const onUp=()=>{ dragging=false; imgWrap.classList.remove('panning'); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);

  imgWrap.addEventListener('dblclick', e=>{
    e.stopPropagation();
    card.imgPan={x:0,y:0,scale:1};
    applyImgTransform(img, card.imgPan);
  });

  imgWrap._isDragMoved = ()=>dragMoved;
}

function triggerUpload(secId,cardId){
  pendingUpload={secId,cardId};
  document.getElementById('file-input').click();
}

function applyImageToCard(sec,card,src){
  card.img=src;
  const cardEl=document.querySelector(`[data-card-id="${card.id}"]`);
  if(!cardEl) return;
  const iw=cardEl.querySelector('.card-img-wrap');
  iw.querySelector('.card-placeholder')?.remove();
  iw.querySelectorAll('img,.card-upload-overlay').forEach(n=>n.remove());
  const img=document.createElement('img');
  img.src=src; img.alt='';
  iw.insertBefore(img,iw.firstChild);
  const ovl=document.createElement('div'); ovl.className='card-upload-overlay';
  ovl.innerHTML='<span>이미지 변경</span>';
  ovl.addEventListener('click',e=>{
    if(iw._isDragMoved && iw._isDragMoved()) return;
    triggerUpload(sec.id,card.id);
  });
  iw.insertBefore(ovl,iw.querySelector('.card-gradient'));
  requestAnimationFrame(()=>setupImgPanZoom(iw, card, img));
}

document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file||!pendingUpload) return;
  const {secId,cardId}=pendingUpload;
  pendingUpload=null; e.target.value='';

  const sec=sections.find(s=>s.id===secId);
  const card=sec&&sec.cards.find(c=>c.id===cardId);
  if(!card) return;

  const blobUrl=URL.createObjectURL(file);
  applyImageToCard(sec,card,blobUrl);

  const reader=new FileReader();
  reader.onload=ev=>{
    card.img=ev.target.result;
    const imgEl=document.querySelector(`[data-card-id="${card.id}"] .card-img-wrap img`);
    if(imgEl) imgEl.src=ev.target.result;
    URL.revokeObjectURL(blobUrl);
  };
  reader.readAsDataURL(file);
});

// ── Add Section ─────────────────────────────────────────
function addSection(){
  const newSec={id:genId(),name:'ARCH',cls:'CLASS',cards:[]};
  sections.push(newSec);
  document.getElementById('sections-container').appendChild(buildSection(newSec));
}

// ── Save Image ──────────────────────────────────────────
async function saveImage(){
  const btn=document.querySelector('.btn-save');
  btn.textContent='저장 중...'; btn.disabled=true;
  document.activeElement?.blur();
  window.scrollTo(0,0);

  await new Promise(r=>setTimeout(r,80));

  const captureEl=document.getElementById('roster-canvas');
  const hidden=[];
  const replaced=[];
  const ceEls=[];
  const imgTransforms=[];
  const wrapFixes=[];

  try {
    const HIDE=[
      '.card-add-btn','.section-del','.card-upload-overlay',
      '.card-remove','.card-type-toggle','.add-section-row'
    ];
    HIDE.forEach(sel=>{
      captureEl.querySelectorAll(sel).forEach(el=>{
        hidden.push([el,el.style.display]);
        el.style.display='none';
      });
    });

    captureEl.querySelectorAll('.card').forEach(cardEl=>{
      if(cardEl.querySelector('.card-placeholder')){
        hidden.push([cardEl,cardEl.style.display]);
        cardEl.style.display='none';
      }
    });

    captureEl.querySelectorAll('.section').forEach(secEl=>{
      const visibleCards=Array.from(secEl.querySelectorAll('.card'))
        .filter(c=>c.style.display!=='none');
      if(visibleCards.length===0){
        hidden.push([secEl,secEl.style.display]);
        secEl.style.display='none';
      }
    });

    captureEl.querySelectorAll('.card-attr-select').forEach(sel=>{
      const txt=sel.options[sel.selectedIndex]?.text||'';
      const ai=attrInfo(txt);
      const span=document.createElement('span');
      span.textContent=txt;
      span.style.cssText=[
        'display:inline-block',
        `background:${ai.bg}`,`color:${ai.fg}`,
        'font-size:10px','padding:2px 10px 2px',
        'border-radius:20px',
        "font-family:'Noto Sans KR',sans-serif",
        'font-weight:700','line-height:1.4',
        'border:none','outline:none',
        'pointer-events:none','user-select:none',
      ].join(';');
      sel.parentNode.replaceChild(span,sel);
      replaced.push([span,sel]);
    });

    captureEl.querySelectorAll('[contenteditable]').forEach(el=>{
      ceEls.push([el,el.getAttribute('contenteditable')]);
      el.removeAttribute('contenteditable');
      el.style.outline='none'; el.style.border='none';
    });

    captureEl.querySelectorAll('.card-img-wrap img').forEach(img=>{
      imgTransforms.push([img,img.style.transition]);
      img.style.transition='none';
    });

    // html-to-image의 foreignObject 렌더링을 깨뜨리는 CSS를 캡처 동안만 해제
    // (contain:paint / backface-visibility:hidden 가 카드 이미지를 공란으로 만드는 원인)
    captureEl.querySelectorAll('.card-img-wrap').forEach(w=>{
      wrapFixes.push([w, w.style.contain, w.style.backfaceVisibility, w.style.webkitBackfaceVisibility]);
      w.style.contain='none';
      w.style.backfaceVisibility='visible';
      w.style.webkitBackfaceVisibility='visible';
    });

    // 모든 이미지가 완전히 로드/디코드될 때까지 대기 (첫 저장 시 공란 방지)
    const imgEls=Array.from(captureEl.querySelectorAll('.card-img-wrap img'));
    await Promise.all(imgEls.map(async img=>{
      try{
        if(!img.complete || img.naturalWidth===0){
          await new Promise(res=>{ img.onload=res; img.onerror=res; });
        }
        if(img.decode) await img.decode();
      }catch(e){ /* 디코드 실패는 무시하고 진행 */ }
    }));

    await new Promise(r=>setTimeout(r,60));

    const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0d1117';

    const fontCSS=cachedFontCSS||await htmlToImage.getFontEmbedCSS(captureEl).catch(()=>'');
    const dataUrl=await htmlToImage.toPng(captureEl,{
      pixelRatio:2,
      backgroundColor: bgColor,
      fontEmbedCSS:fontCSS,
      style: {
        borderRadius: '14px',
      }
    });

    const a=document.createElement('a');
    a.href=dataUrl; a.download='arch-roster.png';
    document.body.appendChild(a); a.click();
    setTimeout(()=>a.remove(),1000);

  } catch(err){
    alert('저장 오류: '+err.message);
    console.error(err);
  } finally {
    hidden.forEach(([el,d])=>{el.style.display=d;});
    replaced.forEach(([span,sel])=>{
      if(span.parentNode) span.parentNode.replaceChild(sel,span);
    });
    ceEls.forEach(([el,v])=>{el.setAttribute('contenteditable',v);});
    imgTransforms.forEach(([img,ti])=>{
      img.style.transition=ti;
    });
    wrapFixes.forEach(([w,c,bf,wbf])=>{
      w.style.contain=c;
      w.style.backfaceVisibility=bf;
      w.style.webkitBackfaceVisibility=wbf;
    });
    btn.textContent='💾 이미지로 저장'; btn.disabled=false;
  }
}

render();
</script>
